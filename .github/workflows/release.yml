name: Release

env:
  NAME: git-rndocs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Dependencies
        run: go mod download

      # ------------------------
      # Install tools
      # ------------------------
      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Install FPM
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Create dist directory
        run: mkdir -p dist

      # ------------------------
      # Windows + Installer
      # ------------------------
      - name: Build Windows binary and NSIS Installer
        run: make installer-nsis VERSION=${GITHUB_REF_NAME#v} NSIS_VERSION=${GITHUB_REF_NAME#v}

      # ------------------------
      # Linux + .deb (via Makefile)
      # ------------------------
      - name: Build for Linux
        env:
          GOOS: linux
          GOARCH: amd64
          VERSION: ${GITHUB_REF_NAME#v}
        run: go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/${{ env.NAME }}-linux-amd64 .

      - name: Build Debian Package
        run: make deb DEB_VERSION=${GITHUB_REF_NAME#v}

      # ------------------------
      # macOS
      # ------------------------
      - name: Build for macOS (Intel)
        env:
          GOOS: darwin
          GOARCH: amd64
          VERSION: ${GITHUB_REF_NAME#v}
        run: go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/${{ env.NAME }}-darwin-amd64 .

      - name: Build for macOS (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
          VERSION: ${GITHUB_REF_NAME#v}
        run: go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/${{ env.NAME }}-darwin-arm64 .

      # ------------------------
      # Debug
      # ------------------------
      - name: Debug dist contents
        run: ls -la dist/

      # ------------------------
      # Release
      # ------------------------
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.NAME }}-windows-amd64.exe
            dist/${{ env.NAME }}-linux-amd64
            dist/${{ env.NAME }}-darwin-amd64
            dist/${{ env.NAME }}-darwin-arm64
            dist/${{ env.NAME }}-setup.exe
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------
      # Release Notes
      # ------------------------
      - name: Build git-rndocs binary
        run: go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" -o git-rndocs .

      - name: Generate release notes
        run: ./git-rndocs generate --output docs/releases --overwrite

      - name: Upload release notes to GitHub Release
        run: gh release edit ${GITHUB_REF_NAME} --notes-file docs/releases/${GITHUB_REF_NAME}/RELEASE-NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
