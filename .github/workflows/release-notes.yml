name: Generate Release Notes

on:
  push:
    tags:
      - "v*"

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install git-rndocs
        run: go install github.com/marcuwynu23/git-rndocs@latest

      - name: Generate release notes
        run: git rndocs generate --output docs/releases --overwrite

      - name: Upload to GitHub Release
        run: git rndocs release --upload --overwrite
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
